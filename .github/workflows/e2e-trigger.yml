name: Trigger E2E Tests

on:
  deployment_status:

jobs:
  trigger-e2e:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine scope and payload
        id: scope
        shell: bash
        run: |
          environment_name="${{ github.event.deployment_status.environment }}"
          target_url="${{ github.event.deployment_status.target_url }}"
          deployment_ref="${{ github.event.deployment.ref }}"

          if [[ "$environment_name" == "Production" || "$target_url" =~ ^https://portal\.fiziyo\.pl(/.*)?$ ]]; then
            echo "project=smoke-tests" >> "$GITHUB_OUTPUT"
            echo "event_type=e2e-prod-run" >> "$GITHUB_OUTPUT"
          elif [[ "$target_url" =~ ^https://dev\.portal\.fiziyo\.pl(/.*)?$ || "$environment_name" == "Development" || "$deployment_ref" == "dev" ]]; then
            echo "project=all" >> "$GITHUB_OUTPUT"
            echo "event_type=e2e-dev-run" >> "$GITHUB_OUTPUT"
          elif [[ "$environment_name" == "Preview" ]]; then
            echo "project=smoke-tests" >> "$GITHUB_OUTPUT"
            echo "event_type=e2e-dev-run" >> "$GITHUB_OUTPUT"
          else
            echo "project=all" >> "$GITHUB_OUTPUT"
            echo "event_type=e2e-dev-run" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger fiziyo-tests repository
        uses: actions/github-script@v7
        env:
          TESTS_REPO_OWNER: ${{ vars.E2E_TESTS_REPO_OWNER }}
          TESTS_REPO_NAME: ${{ vars.E2E_TESTS_REPO_NAME }}
        with:
          github-token: ${{ secrets.E2E_DISPATCH_PAT }}
          script: |
            const targetUrl = context.payload.deployment_status?.target_url;
            const environmentName = context.payload.deployment_status?.environment;
            const deploymentSha = context.payload.deployment?.sha;
            const testsOwner = process.env.TESTS_REPO_OWNER || context.repo.owner;
            const testsRepo = process.env.TESTS_REPO_NAME || "fiziyo-tests";

            if (!targetUrl || !deploymentSha || !environmentName) {
              core.setFailed("Missing deployment payload fields required for dispatch.");
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: testsOwner,
              repo: testsRepo,
              event_type: "${{ steps.scope.outputs.event_type }}",
              client_payload: {
                base_url: targetUrl,
                environment: environmentName,
                sha: deploymentSha,
                project: "${{ steps.scope.outputs.project }}",
                admin_owner: context.repo.owner,
                admin_repo: context.repo.repo,
                run_id: String(context.runId),
              },
            });
