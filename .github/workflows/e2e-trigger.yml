name: Trigger E2E Tests

on:
  deployment_status:

jobs:
  trigger-e2e:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine scope and payload
        id: scope
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const environmentName = context.payload.deployment_status?.environment ?? "";
            const targetUrl = context.payload.deployment_status?.target_url ?? "";
            const deploymentRef = context.payload.deployment?.ref ?? "";
            const deploymentSha = context.payload.deployment?.sha ?? "";

            let selectedProject = "all";
            let selectedEventType = "e2e-dev-run";
            let matchedReason = "fallback-non-preview";
            let branchesForSha = [];

            const isProductionUrl = /^https:\/\/portal\.fiziyo\.pl(\/.*)?$/.test(targetUrl);
            const isDedicatedDevUrl =
              /^https:\/\/devportal\.fiziyo\.pl(\/.*)?$/.test(targetUrl) ||
              /^https:\/\/dev\.portal\.fiziyo\.pl(\/.*)?$/.test(targetUrl);

            let isDevBranch = deploymentRef === "dev" || deploymentRef === "refs/heads/dev";

            if (deploymentSha) {
              try {
                const response = await github.rest.repos.listBranchesForHeadCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: deploymentSha,
                });

                branchesForSha = response.data.map((branch) => branch.name);
                isDevBranch = isDevBranch || branchesForSha.includes("dev");
              } catch (error) {
                core.warning(`Could not resolve branches for SHA ${deploymentSha}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }

            if (environmentName === "Production" || isProductionUrl) {
              selectedProject = "smoke-tests";
              selectedEventType = "e2e-prod-run";
              matchedReason = "production";
            } else if (isDedicatedDevUrl) {
              selectedProject = "all";
              selectedEventType = "e2e-dev-run";
              matchedReason = "dedicated-dev-domain";
            } else if (environmentName === "Development") {
              selectedProject = "all";
              selectedEventType = "e2e-dev-run";
              matchedReason = "development-environment";
            } else if (isDevBranch) {
              selectedProject = "all";
              selectedEventType = "e2e-dev-run";
              matchedReason = "commit-on-dev-branch";
            } else if (environmentName === "Preview") {
              selectedProject = "smoke-tests";
              selectedEventType = "e2e-dev-run";
              matchedReason = "generic-preview";
            }

            core.setOutput("project", selectedProject);
            core.setOutput("event_type", selectedEventType);

            core.info(
              `Resolved E2E scope: env=${environmentName || "<empty>"} url=${targetUrl || "<empty>"} branches=${branchesForSha.length > 0 ? branchesForSha.join(",") : "<none>"} reason=${matchedReason} project=${selectedProject} event=${selectedEventType}`,
            );

      - name: Trigger fiziyo-tests repository
        uses: actions/github-script@v7
        env:
          TESTS_REPO_OWNER: ${{ vars.E2E_TESTS_REPO_OWNER }}
          TESTS_REPO_NAME: ${{ vars.E2E_TESTS_REPO_NAME }}
        with:
          github-token: ${{ secrets.E2E_DISPATCH_PAT }}
          script: |
            const targetUrl = context.payload.deployment_status?.target_url;
            const environmentName = context.payload.deployment_status?.environment;
            const deploymentSha = context.payload.deployment?.sha;
            const testsOwner = process.env.TESTS_REPO_OWNER || context.repo.owner;
            const testsRepo = process.env.TESTS_REPO_NAME || "fiziyo-tests";

            if (!targetUrl || !deploymentSha || !environmentName) {
              core.setFailed("Missing deployment payload fields required for dispatch.");
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: testsOwner,
              repo: testsRepo,
              event_type: "${{ steps.scope.outputs.event_type }}",
              client_payload: {
                base_url: targetUrl,
                environment: environmentName,
                sha: deploymentSha,
                project: "${{ steps.scope.outputs.project }}",
                admin_owner: context.repo.owner,
                admin_repo: context.repo.repo,
                run_id: String(context.runId),
              },
            });
